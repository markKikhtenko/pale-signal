name: Regenerate subscription

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate and publish subscription
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate subscription files
        run: python scripts/build_subscription.py

      - name: Commit subscription when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md subscription.yaml merged_flclash.yaml subscription_base64.txt subscription_info.txt servers_history.json
          if git diff --cached --quiet; then
            echo "subscription files are unchanged"
          else
            git commit -m "Update subscription"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp subscription.yaml public/subscription.yaml
          cp merged_flclash.yaml public/merged_flclash.yaml
          cp subscription_base64.txt public/subscription_base64.txt
          cp subscription_info.txt public/subscription_info.txt
          cp servers_history.json public/servers_history.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publish subscription to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Regenerate subscription

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC: 06:00 and 18:00 UTC = 09:00 and 21:00 MSK.
    - cron: "0 6,18 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate and publish subscription
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate subscription files
        run: python scripts/build_subscription.py

      - name: Build checked global subscription
        run: |
          CHECKED_HEALTHCHECK_URL="https://raw.githubusercontent.com/markKikhtenko/pale-signal/${GITHUB_SHA}/healthcheck.txt" \
            python scripts/build_checked_subscription.py

      - name: Commit subscription when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md update-history.json subscription.yaml subscription-ru.yaml subscription-global.yaml
          if [ -f subscription-global-checked.yaml ]; then
            git add subscription-global-checked.yaml
          fi
          if git diff --cached --quiet; then
            echo "subscription files are unchanged"
          else
            git commit -m "Update subscription"
            git pull --rebase origin main
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp subscription.yaml public/subscription.yaml
          cp subscription-ru.yaml public/subscription-ru.yaml
          cp subscription-global.yaml public/subscription-global.yaml
          cp healthcheck.txt public/healthcheck.txt
          if [ -f subscription-global-checked.yaml ]; then
            cp subscription-global-checked.yaml public/subscription-global-checked.yaml
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publish subscription to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
